{% extends "layout.html" %}

{% block content %}
<div class="page">
    <h1>{{category_name}}</h1>
    {% if crystals %}
        <div class="grid">
            {% for crystal in crystals %}
                <div class="card">
                    <div class="text">
                        <h2>{{ crystal.name }}</h2>
                        <p>{{ crystal.description }}</p>
                    </div>
                    <div class="image">
                        <img src="{{ url_for('static', filename='images/' + crystal.image) }}">
                    </div>
                </div>
            {% endfor %}
        </div>
    {% else %}
        <p>You don't have any crystals in this category yet.</p>
    {% endif %}
</div>
{% endblock %}
