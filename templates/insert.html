
{% extends "layout.html" %}

{% block content %}
<div class="page">
    <div class="container">
        <h1 class="text-white mb-4 text-center">Add a crystal to your collection</h1>

        <form id= "insert_form" method="POST" action="{{ url_for('insert') }}" enctype="multipart/form-data">
           
            <div class="row mb-3 align-items-center">
                <label for="name" class="col-sm-3 col-form-label text-white">Crystal Name:</label>
                <div class="col-sm-6">
                    <input type="text" id="name" class="form-control" name="name" required>
                    <div class="text-danger small" id="nameError"></div>
                </div>
            </div>
            
            <div class="row mb-3 align-items-center">
                <label for="description" class="col-sm-3 col-form-label text-white">Description:</label>
                <div class="col-sm-6">
                    <input type="text" id="description" class="form-control" name="description" required>
                    <div class="text-danger small" id="descriptionError"></div>
                </div>
            </div>
            
            <div class="row mb-3 align-items-center">
                <label for="image" class="col-sm-3 col-form-label text-white">Crystal Image:</label>
                <div class="col-sm-6">
                    <input type="file" id="image" class="form-control" name="image" required>
                    <div class="text-danger small" id="imageError"></div>
                </div>
            </div>
            
            <div class="row mb-3 align-items-center">
                <label for="uses" class="col-sm-3 col-form-label text-white">Uses:</label>
                <div class="col-sm-6">
                    <input type="text" id="uses" class="form-control" name="uses" required>
                    <div class="text-danger small" id="usesError"></div>
                </div>
            </div>
            
            <div class="row mb-3 align-items-center">
                <label for="category" class="col-sm-3 col-form-label text-white">Category:</label>
                <div class="col-sm-6">
                    <select id="category" class="form-select" name="category" required>
                        <option value="">Choose a category</option>
                        <option value="Raw Crystals">Raw Crystals</option>
                        <option value="Tumbled Crystals">Tumbled Crystals</option>
                        <option value="Crystal Towers">Crystal Towers</option>
                        <option value="Carved Crystals">Carved Crystals</option>
                        <option value="Crystal Hearts">Crystal Hearts</option>
                        <option value="Crystal Clusters">Crystal Clusters</option>
                    </select>
                    <div class="text-danger small" id="categoryError"></div>
                </div>
            </div>
            <br>
            <div class="row">
                <div class="col-sm-6 offset-sm-3">
                    <button type="submit" class="btn btn-primary w-100 mt-3">Add Crystal to Collection</button>                  
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
